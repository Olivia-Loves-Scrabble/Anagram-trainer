<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anagram Trainer</title>

<style>
body { font-family: Arial, sans-serif; padding: 20px; }
button { padding: 10px; margin: 5px 0; font-size: 16px; }
input { padding: 10px; font-size: 16px; width: 100%; margin-top: 10px; }
.hidden { display: none; }
#revealedWords { margin-top: 15px; font-weight: bold; }
</style>
</head>

<body>

<h1>Anagram Trainer</h1>

<h2>Add Words</h2>
<textarea id="wordInput" rows="4" style="width:100%;" placeholder="Enter words separated by commas"></textarea>
<button onclick="saveWords()">Save Words</button>

<h2>Practice</h2>
<button onclick="startPractice()">Start</button>

<div id="practiceArea" class="hidden">
<p id="jumbledLetters"></p>

<input 
  id="answerInput" 
  type="text" 
  placeholder="Type answer(s) separated by space"
  autocomplete="off"
  autocorrect="off"
  autocapitalize="none"
  spellcheck="false"
/>
<button onclick="submitAnswer()">Submit</button>
<button onclick="revealAnswers()">Reveal Answers</button>

<p id="counter"></p>
<p id="status" aria-live="polite"></p>
<div id="revealedWords" aria-live="polite"></div>

<button id="nextButton" class="hidden" onclick="nextAnagram()">Next</button>
</div>

<script>
let wordList = JSON.parse(localStorage.getItem("scrabbleLists")) || [];
let currentSet = [];
let correctAnswers = [];
let remainingAnswers = [];

function saveWords() {
    let input = document.getElementById("wordInput").value;
    let words = input.split(",").map(w => w.trim().toLowerCase()).filter(Boolean);
    wordList.push(words);
    localStorage.setItem("scrabbleLists", JSON.stringify(wordList));
    alert("Words saved");
}

function shuffle(word) {
    return word.split("").sort(() => Math.random() - 0.5).join("");
}

function startPractice() {
    if (wordList.length === 0) {
        alert("No word sets saved.");
        return;
    } document.getElementById("practiceArea").classList.remove("hidden");
    nextAnagram();
}

function spellLetters(word) {
    return word.split("").join(" ");
}

function speak(text) {
    let status = document.getElementById("status");
    status.textContent = "";
    setTimeout(() => { status.textContent = text; }, 100);
}

function nextAnagram() {
    document.getElementById("revealedWords").textContent = "";
    document.getElementById("nextButton").classList.add("hidden");

    currentSet = wordList[Math.floor(Math.random() * wordList.length)];
    correctAnswers = [];
    remainingAnswers = [...currentSet];

    let jumbled = shuffle(currentSet[0]);
    document.getElementById("jumbledLetters").textContent = jumbled;

    speak("New letters: " + spellLetters(jumbled));
    updateCounter();
}

function submitAnswer() {
    let input = document.getElementById("answerInput");
    let entries = input.value.toLowerCase().trim().split(" ").filter(Boolean);
    input.value = "";

    let correctSound = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
    let setCompleteSound = new Audio("https://actions.google.com/sounds/v1/cartoon/concussive_drum_hit.ogg");

    let foundNewCorrect = false;

    entries.forEach(entry => {
        if (remainingAnswers.includes(entry)) {
            correctAnswers.push(entry);
            remainingAnswers = remainingAnswers.filter(w => w !== entry);
            foundNewCorrect = true;
        }
    });

    if (foundNewCorrect) correctSound.play();

    updateCounter();

    if (remainingAnswers.length === 0) {
        speak("Correct");
        setCompleteSound.play();
        document.getElementById("nextButton").classList.remove("hidden");
    }
}

function revealAnswers() {
    let revealDiv = document.getElementById("revealedWords");
    revealDiv.textContent = "Answers: " + currentSet.join(", ");
    speak("Answers revealed");
}

function updateCounter() { document.getElementById("counter").textContent =
        correctAnswers.length + " of " + currentSet.length + " correct";
}
</script>

</body>
</html>
