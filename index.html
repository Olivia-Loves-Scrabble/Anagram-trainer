<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anagram Trainer</title>
<style>
body { font-family: Arial, sans-serif; padding: 20px; }
button { margin: 5px 0; padding: 10px; }
input, textarea { padding: 8px; margin: 5px 0; width: 100%; }
.hidden { display: none; }
</style>
</head>
<body>

<h1>Anagram Trainer</h1>

<section id="listManager">
<h2>Your Lists</h2>
<div id="lists"></div>
<input id="newListName" placeholder="New list name">
<button onclick="createList()">Create List</button>
</section>

<section id="wordManager" class="hidden">
<h2 id="currentListTitle"></h2>
<textarea id="wordInput" placeholder="Enter words separated by commas"></textarea>
<button onclick="addWords()">Save Words</button>
<button onclick="startStudy()">Start Study</button>
<button onclick="goBack()">Back</button>
</section>

<section id="studySection" class="hidden">
<h2 id="jumbleDisplay"></h2>
<p id="anagramCount"></p>
<input id="guessInput" placeholder="Enter your guess">
<button onclick="submitGuess()">Submit</button>
<button onclick="revealAnswers()">Reveal Answers</button>
<p id="progress"></p>
<button id="nextButton" class="hidden" onclick="nextSet()">Next</button>
</section>

<script>
let lists = JSON.parse(localStorage.getItem("scrabbleLists")) || {};
let currentList = null;
let currentSet = [];
let foundWords = [];
let currentKey = "";

function save() {
localStorage.setItem("scrabbleLists", JSON.stringify(lists));
}

function renderLists() {
let container = document.getElementById("lists");
container.innerHTML = "";
for (let name in lists) {
let btn = document.createElement("button");
btn.innerText = name;
btn.onclick = () => openList(name);
container.appendChild(btn);
}
}
renderLists();

function createList() {
let name = document.getElementById("newListName").value.trim();
if (!name) return;
lists[name] = {};
save();
renderLists(); document.getElementById("newListName").value = "";
}

function openList(name) {
currentList = name;
document.getElementById("listManager").classList.add("hidden");
document.getElementById("wordManager").classList.remove("hidden");
document.getElementById("currentListTitle").innerText = name;
}

function goBack() {
document.getElementById("wordManager").classList.add("hidden");
document.getElementById("listManager").classList.remove("hidden");
}

function addWords() {
let input = document.getElementById("wordInput").value;
let words = input.split(",").map(w => w.trim().toUpperCase()).filter(Boolean);
words.forEach(word => {
let key = sortLetters(word);
if (!lists[currentList][key]) lists[currentList][key] = [];
if (!lists[currentList][key].includes(word)) {
lists[currentList][key].push(word);
}
});
save();
document.getElementById("wordInput").value = "";
}

function sortLetters(word) {
let vowels = word.match(/[AEIOU]/g) || [];
let consonants = word.match(/[^AEIOU]/g) || [];
return vowels.sort().join("") + consonants.sort().join("");
}

function startStudy() {
let keys = Object.keys(lists[currentList]);
if (keys.length === 0) return;
currentKey = keys[Math.floor(Math.random() * keys.length)];
currentSet = lists[currentList][currentKey];
foundWords = [];
document.getElementById("wordManager").classList.add("hidden");
document.getElementById("studySection").classList.remove("hidden");
document.getElementById("jumbleDisplay").innerText = currentKey;
document.getElementById("anagramCount").innerText = currentSet.length + " anagrams required.";
document.getElementById("nextButton").classList.add("hidden");
updateProgress();
}

function submitGuess() {
let guess = document.getElementById("guessInput").value.toUpperCase().trim();
if (currentSet.includes(guess) && !foundWords.includes(guess)) {
foundWords.push(guess);
playCorrectSound();
announce("Correct");
}
document.getElementById("guessInput").value = "";
updateProgress();
}

function updateProgress() { document.getElementById("progress").innerText =
foundWords.length + " of " + currentSet.length + " found.";
if (foundWords.length === currentSet.length) {
playCompleteSound();
announce("Correct");
document.getElementById("nextButton").classList.remove("hidden");
}
}

function revealAnswers() {
let remaining = currentSet.filter(w => !foundWords.includes(w));
announce("Answers: " + remaining.join(", "));
document.getElementById("nextButton").classList.remove("hidden");
}

function nextSet() {
startStudy();
}

function announce(message) {
let live = document.createElement("div");
live.setAttribute("aria-live", "assertive");
live.classList.add("hidden");
document.body.appendChild(live);
live.innerText = message;
setTimeout(() => document.body.removeChild(live), 500);
}

function playCorrectSound() {
let ctx = new (window.AudioContext || window.webkitAudioContext)();
let osc = ctx.createOscillator();
osc.type = "sine";
osc.frequency.value = 800;
osc.connect(ctx.destination);
osc.start(); osc.stop(ctx.currentTime + 0.1);
}

function playCompleteSound() {
let ctx = new (window.AudioContext || window.webkitAudioContext)();
let osc = ctx.createOscillator();
osc.type = "sine";
osc.frequency.value = 600;
osc.connect(ctx.destination);
osc.start();
osc.frequency.setValueAtTime(900, ctx.currentTime + 0.1);
osc.stop(ctx.currentTime + 0.3);
}
</script>

</body>
</html>
