<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scrabble Trainer</title>
<style>
body { font-family: Arial, sans-serif; padding: 20px; }
button { margin: 5px 0; padding: 10px; }
input { padding: 8px; margin: 5px 0; width: 100%; }
.hidden { display: none; }
</style>
</head>
<body>

<h1>Scrabble Trainer</h1>

<section id="listManager">
<h2>Your Lists</h2>
<div id="lists"></div>

<input id="newListName" placeholder="New list name">
<button onclick="createList()">Create List</button>
</section>

<section id="wordManager" class="hidden">
<h2 id="currentListTitle"></h2>

<textarea id="wordInput" placeholder="Enter words separated by commas"></textarea>
<button onclick="addWords()">Add Words</button>
<button onclick="startStudy()">Start Study</button>
<button onclick="goBack()">Back</button>
</section>

<section id="studySection" class="hidden">
<h2 id="jumbleDisplay"></h2>
<p id="anagramCount"></p> <input id="guessInput" placeholder="Enter your guess">
<button onclick="submitGuess()">Submit</button>
<p id="progress"></p>
<button onclick="exitStudy()">Exit Study</button>
</section>

<script>
let lists = JSON.parse(localStorage.getItem("scrabbleLists")) || {};
let currentList = null;
let currentSet = [];
let foundWords = [];
let currentKey = "";

function save() {
localStorage.setItem("scrabbleLists", JSON.stringify(lists));
}

function renderLists() {
let container = document.getElementById("lists");
container.innerHTML = "";
for (let name in lists) {
let btn = document.createElement("button");
btn.innerText = name;
btn.onclick = () => openList(name);
container.appendChild(btn);
}
}
renderLists();

function createList() {
let name = document.getElementById("newListName").value.trim();
if (!name) return;
lists[name] = {};
save();
renderLists();
document.getElementById("newListName").value = "";
}

function openList(name) {
currentList = name; document.getElementById("listManager").classList.add("hidden");
document.getElementById("wordManager").classList.remove("hidden");
document.getElementById("currentListTitle").innerText = name;
}

function goBack() {
document.getElementById("wordManager").classList.add("hidden");
document.getElementById("listManager").classList.remove("hidden");
}

function addWords() {
let input = document.getElementById("wordInput").value;
let words = input.split(",").map(w => w.trim().toUpperCase()).filter(Boolean);
words.forEach(word => {
let key = sortLetters(word);
if (!lists[currentList][key]) lists[currentList][key] = [];
lists[currentList][key].push(word);
});
save();
document.getElementById("wordInput").value = "";
alert("Words added.");
}

function sortLetters(word) {
let vowels = word.match(/[AEIOU]/g) || [];
let consonants = word.match(/[^AEIOU]/g) || [];
return vowels.sort().join("") + consonants.sort().join("");
}

function startStudy() {
let keys = Object.keys(lists[currentList]);
if (keys.length === 0) return alert("No words in list.");
currentKey = keys[Math.floor(Math.random() * keys.length)];
currentSet = lists[currentList][currentKey];
foundWords = [];
document.getElementById("listManager").classList.add("hidden");
document.getElementById("wordManager").classList.add("hidden");
document.getElementById("studySection").classList.remove("hidden");
document.getElementById("jumbleDisplay").innerText = currentKey;
document.getElementById("anagramCount").innerText = currentSet.length + " anagrams required.";
updateProgress();
}

function submitGuess() {
let guess = document.getElementById("guessInput").value.toUpperCase().trim();
if (currentSet.includes(guess) && !foundWords.includes(guess)) {
foundWords.push(guess);
}
document.getElementById("guessInput").value = "";
updateProgress();
}

function updateProgress() {
document.getElementById("progress").innerText =
foundWords.length + " of " + currentSet.length + " found.";
if (foundWords.length === currentSet.length) {
alert("Set completed!");
startStudy();
}
}

function exitStudy() {
document.getElementById("studySection").classList.add("hidden");
document.getElementById("listManager").classList.remove("hidden");
}
</script>

</body>
</html><p id="revealedWords"></p>
</div>

<script>
let wordLists = JSON.parse(localStorage.getItem("scrabbleLists")) || [];
let currentSet = [];
let remainingAnswers = [];
let correctAnswers = [];

function saveWords() {
    let input = document.getElementById("wordInput").value;
    let words = input.split(",").map(w => w.trim().toLowerCase()).filter(Boolean);
    if (words.length === 0) return;

    wordLists.push(words);
    localStorage.setItem("scrabbleLists", JSON.stringify(wordLists));
    document.getElementById("wordInput").value = "";
    populateSelector();
    alert("Words saved");
}

function populateSelector() {
    let selector = document.getElementById("listSelector");
    selector.innerHTML = "";

    wordLists.forEach((list, index) => {
        let option = document.createElement("option");
        option.value = index;
        option.textContent = "List " + (index + 1) + " (" + list.length + " words)"; selector.appendChild(option);
    });
}

function shuffle(word) {
    return word.split("").sort(() => Math.random() - 0.5).join("");
}

function startPractice() {
    if (wordLists.length === 0) {
        alert("No lists available.");
        return;
    }

    let selectedIndex = document.getElementById("listSelector").value;
    currentSet = wordLists[selectedIndex];

    correctAnswers = [];
    remainingAnswers = [...currentSet];

    document.getElementById("practiceArea").classList.remove("hidden");
    loadAnagram();
}

function loadAnagram() {
    let baseWord = currentSet[0];
    let jumbled = shuffle(baseWord);
    document.getElementById("jumbledLetters").textContent = jumbled;
    updateCounter();
}

function submitAnswer() {
    let input = document.getElementById("answerInput");
    let guess = input.value.toLowerCase().trim();
    input.value = "";

    if (remainingAnswers.includes(guess)) {
        correctAnswers.push(guess);
        remainingAnswers = remainingAnswers.filter(w => w !== guess);
    }

    updateCounter();
}

function revealAnswers() {
    document.getElementById("revealedWords").textContent =
        "Answers: " + currentSet.join(", ");
}

function updateCounter() {
    document.getElementById("counter").textContent =
        correctAnswers.length + " of " + currentSet.length + " correct";
}

function exitPractice() {
    document.getElementById("practiceArea").classList.add("hidden");
}

populateSelector();
</script>

</body>
</html>
