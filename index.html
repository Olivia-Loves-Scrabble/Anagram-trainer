<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anagram Trainer</title>

<style>
body { font-family: Arial, sans-serif; padding: 20px; }
button { padding: 10px; margin: 5px 0; font-size: 16px; }
input, textarea { padding: 10px; font-size: 16px; width: 100%; margin-top: 10px; }
.hidden { display: none; }
</style>
</head>

<body>

<h1>Anagram Trainer</h1>

<h2>Add Words</h2>
<textarea id="wordInput" rows="4" placeholder="Enter words separated by commas"></textarea>
<button onclick="saveWords()">Save Words</button>

<h2>Choose List</h2>
<select id="listSelector"></select>
<button onclick="startPractice()">Start Practice</button>

<div id="practiceArea" class="hidden">
<p id="jumbledLetters"></p>

<input id="answerInput" type="text" placeholder="Type your answer">
<button onclick="submitAnswer()">Submit</button>
<button onclick="revealAnswers()">Reveal Answers</button>
<button onclick="exitPractice()">Back to Lists</button>

<p id="counter"></p>
<p id="revealedWords"></p>
</div>

<script>
let wordLists = JSON.parse(localStorage.getItem("scrabbleLists")) || [];
let currentSet = [];
let remainingAnswers = [];
let correctAnswers = [];

function saveWords() {
    let input = document.getElementById("wordInput").value;
    let words = input.split(",").map(w => w.trim().toLowerCase()).filter(Boolean);
    if (words.length === 0) return;

    wordLists.push(words);
    localStorage.setItem("scrabbleLists", JSON.stringify(wordLists));
    document.getElementById("wordInput").value = "";
    populateSelector();
    alert("Words saved");
}

function populateSelector() {
    let selector = document.getElementById("listSelector");
    selector.innerHTML = "";

    wordLists.forEach((list, index) => {
        let option = document.createElement("option");
        option.value = index;
        option.textContent = "List " + (index + 1) + " (" + list.length + " words)"; selector.appendChild(option);
    });
}

function shuffle(word) {
    return word.split("").sort(() => Math.random() - 0.5).join("");
}

function startPractice() {
    if (wordLists.length === 0) {
        alert("No lists available.");
        return;
    }

    let selectedIndex = document.getElementById("listSelector").value;
    currentSet = wordLists[selectedIndex];

    correctAnswers = [];
    remainingAnswers = [...currentSet];

    document.getElementById("practiceArea").classList.remove("hidden");
    loadAnagram();
}

function loadAnagram() {
    let baseWord = currentSet[0];
    let jumbled = shuffle(baseWord);
    document.getElementById("jumbledLetters").textContent = jumbled;
    updateCounter();
}

function submitAnswer() {
    let input = document.getElementById("answerInput");
    let guess = input.value.toLowerCase().trim();
    input.value = "";

    if (remainingAnswers.includes(guess)) {
        correctAnswers.push(guess);
        remainingAnswers = remainingAnswers.filter(w => w !== guess);
    }

    updateCounter();
}

function revealAnswers() {
    document.getElementById("revealedWords").textContent =
        "Answers: " + currentSet.join(", ");
}

function updateCounter() {
    document.getElementById("counter").textContent =
        correctAnswers.length + " of " + currentSet.length + " correct";
}

function exitPractice() {
    document.getElementById("practiceArea").classList.add("hidden");
}

populateSelector();
</script>

</body>
</html>
